<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" role="img" aria-labelledby="title desc">
  <title id="title">Diplomatic Cargo</title>
  <desc id="desc">Red and blue Diplomatic Cargo logo with globe mark.</desc>
  <defs>
    <linearGradient id="globeBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B49A6"/>
      <stop offset="100%" stop-color="#2D3698"/>
    </linearGradient>
    <linearGradient id="ringRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E22A22"/>
      <stop offset="100%" stop-color="#C61E1D"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="300" fill="none"/>

  <!-- globe emblem -->
  <g transform="translate(18 8)">
    <circle cx="120" cy="120" r="98" fill="#fff" stroke="#d9d9d9" stroke-width="4"/>
    <circle cx="120" cy="120" r="98" fill="none" stroke="url(#ringRed)" stroke-width="18" stroke-linecap="round"
      stroke-dasharray="160 140" stroke-dashoffset="18"/>
    <path d="M45 126c18 20 33 42 56 52 30 14 63 1 87-19 18-15 31-36 36-60-8 12-20 18-34 22-26 8-48-10-69-27-23-18-47-36-76-34-10 1-18 4-24 8-4 22 5 41 24 58z" fill="url(#globeBlue)"/>
    <path d="M61 62c22-20 50-32 79-34 23-1 45 3 68 12-18 18-39 33-58 40-21 8-43 8-65 1-9-3-17-9-24-19z" fill="#f7f7f7" opacity="0.95"/>
    <path d="M74 79c14-10 29-16 45-19 28-5 56 1 82 13" fill="none" stroke="#c6c6c6" stroke-width="3" opacity="0.9"/>
    <path d="M68 100c18-8 38-13 59-15 30-2 60 1 90 10" fill="none" stroke="#c6c6c6" stroke-width="3" opacity="0.9"/>
    <path d="M63 123c21-4 42-5 63-3 31 3 60 10 89 23" fill="none" stroke="#c6c6c6" stroke-width="3" opacity="0.9"/>
    <path d="M67 146c21 1 41 6 59 14 29 13 52 31 72 54" fill="none" stroke="#c6c6c6" stroke-width="3" opacity="0.9"/>
    <path d="M90 38c-5 20-7 38-7 58 0 28 5 55 16 83" fill="none" stroke="#c6c6c6" stroke-width="3" opacity="0.9"/>
    <path d="M124 23c-5 23-7 45-6 69 1 31 6 60 15 86" fill="none" stroke="#c6c6c6" stroke-width="3" opacity="0.9"/>
    <path d="M158 30c-1 20-1 38 2 57 4 26 11 50 21 73" fill="none" stroke="#c6c6c6" stroke-width="3" opacity="0.9"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(225 46)" font-family="Arial, Helvetica, sans-serif" font-weight="800" letter-spacing="0">
    <text x="0" y="82" font-size="86" fill="#E1251B">DIPLOMATIC</text>
    <line x1="0" y1="152" x2="200" y2="152" stroke="#3C4AA5" stroke-width="14" stroke-linecap="round"/>
    <text x="236" y="182" font-size="90" fill="#3C4AA5" font-weight="700">Cargo</text>
    <line x1="760" y1="152" x2="980" y2="152" stroke="#3C4AA5" stroke-width="14" stroke-linecap="round"/>
  </g>
</svg>
